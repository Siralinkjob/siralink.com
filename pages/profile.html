<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Profile - SiraLink</title>

<link rel="stylesheet" href="../assets/css/main.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f7fb;
padding-bottom:90px;
}

.header{
background:url('../assets/images/backgrounds/office-bg.jpg') center/cover;
position:relative;
padding:40px 20px;
color:white;
}

.header::before{
content:'';
position:absolute;
inset:0;
background:rgba(0,0,0,.45);
}

.header-content{
position:relative;
z-index:2;
text-align:center;
}

.avatar{
width:110px;
height:110px;
border-radius:50%;
border:4px solid white;
object-fit:cover;
background:white;
}

.name{
margin-top:12px;
font-size:24px;
font-weight:bold;
}

.job-title{
font-size:15px;
opacity:.9;
}

.profile-completion{
margin-top:15px;
background:rgba(255,255,255,.2);
padding:10px;
border-radius:12px;
}

.progress{
height:10px;
background:rgba(255,255,255,.3);
border-radius:20px;
overflow:hidden;
margin-top:8px;
}

.progress-bar{
height:100%;
width:80%;
background:white;
}

.section{
background:white;
margin:15px;
padding:20px;
border-radius:18px;
box-shadow:0 4px 12px rgba(0,0,0,.08);
}

.section h2{
font-size:18px;
margin-bottom:12px;
color:#0A3D91;
}

.info-row{
display:flex;
justify-content:space-between;
padding:10px 0;
border-bottom:1px solid #eee;
}

.info-row:last-child{
border-bottom:none;
}

.label{
color:#666;
}

.value{
font-weight:600;
color:#222;
}

.action-btn{
display:block;
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:12px;
background:#0A3D91;
color:white;
font-size:15px;
font-weight:bold;
cursor:pointer;
}

.secondary-btn{
background:#eef4ff;
color:#0A3D91;
}

.stats{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
}

.stat-card{
background:#f8faff;
padding:15px;
border-radius:12px;
text-align:center;
}

.stat-card h3{
color:#0A3D91;
font-size:22px;
}

.stat-card p{
font-size:13px;
color:#666;
margin-top:5px;
}

.bottom-nav{
position:fixed;
bottom:0;
left:0;
width:100%;
background:white;
display:flex;
justify-content:space-around;
padding:12px 0;
box-shadow:0 -2px 10px rgba(0,0,0,.1);
}

.bottom-nav a{
text-decoration:none;
color:#0A3D91;
font-size:14px;
font-weight:bold;
}

</style>
</head>

<body>

<div class="header">

<div class="header-content">

<img
src="../assets/images/default-avatar.png"
alt="Profile"
class="avatar">

<div class="name">John Doe</div>

<div class="job-title">
Software Engineer
</div>

<div class="profile-completion">

<div>Profile Completion: 80%</div>

<div class="progress">
<div class="progress-bar"></div>
</div>

</div>

</div>

</div>

<div class="section">

<h2>Profile Statistics</h2>

<div class="stats">

<div class="stat-card">
<h3>25</h3>
<p>Applications</p>
</div>

<div class="stat-card">
<h3>8</h3>
<p>Saved Jobs</p>
</div>

<div class="stat-card">
<h3>12</h3>
<p>Matches</p>
</div>

</div>

</div>

<div class="section">

<h2>Personal Information</h2>

<div class="info-row">
<span class="label">Full Name</span>
<span class="value">John Doe</span>
</div>

<div class="info-row">
<span class="label">Email</span>
<span class="value">john@example.com</span>
</div>

<div class="info-row">
<span class="label">Department</span>
<span class="value">IT</span>
</div>

<div class="info-row">
<span class="label">Experience</span>
<span class="value">3 Years</span>
</div>

<div class="info-row">
<span class="label">Location</span>
<span class="value">Addis Ababa</span>
</div>

</div>

<div class="section">

<h2>Documents</h2>

<button class="action-btn">
Upload CV
</button>

<button class="action-btn secondary-btn">
Upload Certificate
</button>

</div>

<div class="section">

<h2>Account Actions</h2>

<button class="action-btn">
Edit Profile
</button>

<button class="action-btn secondary-btn">
Settings
</button>

</div>

<div class="bottom-nav">

<a href="home.html">Home</a>

<a href="jobs.html">Jobs</a>

<a href="notifications.html">Notifications</a>

<a href="profile.html">Profile</a>

</div>

<script>

document
.querySelector(".action-btn")
?.addEventListener("click",()=>{

alert("Profile editor will be connected to Supabase.");

});

</script>

</body>
</html>
