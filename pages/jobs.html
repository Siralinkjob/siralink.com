<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SiraLink Admin Jobs</title>

<link rel="stylesheet" href="../../assets/css/admin.css">

<style>

body{
    background:#f5f7fb;
    font-family:Arial,sans-serif;
    margin:0;
    padding:20px;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

.header h1{
    margin:0;
}

.top-bar{
    display:flex;
    gap:10px;
    margin-bottom:20px;
}

#searchInput{
    flex:1;
    padding:12px;
    border:1px solid #ddd;
    border-radius:10px;
    outline:none;
}

.add-btn{
    background:#0088cc;
    color:white;
    text-decoration:none;
    padding:12px 20px;
    border-radius:10px;
}

.stats{
    background:white;
    padding:15px;
    border-radius:12px;
    margin-bottom:20px;
}

#jobsContainer{
    display:grid;
    gap:15px;
}

.job-card{
    background:white;
    border-radius:15px;
    padding:20px;
    box-shadow:0 2px 10px rgba(0,0,0,.05);
}

.job-header{
    margin-bottom:15px;
}

.job-header h3{
    margin:0;
    color:#222;
}

.job-body p{
    margin:8px 0;
    color:#555;
}

.job-actions{
    margin-top:15px;
    display:flex;
    gap:10px;
}

.edit-btn{
    background:#28a745;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:8px;
    cursor:pointer;
}

.delete-btn{
    background:#dc3545;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:8px;
    cursor:pointer;
}

.loading,
.error,
.empty{
    background:white;
    padding:20px;
    border-radius:15px;
    text-align:center;
}

.back-btn{
    text-decoration:none;
    color:#0088cc;
}

</style>

</head>

<body>

<div class="header">

<div>
<h1>Jobs Management</h1>
<a href="dashboard.html" class="back-btn">
← Back Dashboard
</a>
</div>

<a href="add-job.html" class="add-btn">
+ Add Job
</a>

</div>

<div class="top-bar">

<input
type="text"
id="searchInput"
placeholder="Search by title, company or department">

</div>

<div class="stats">

<strong>Total Jobs:</strong>
<span id="totalJobs">0</span>

</div>

<div id="jobsContainer">

<div class="loading">
Loading jobs...
</div>

</div>

<script
type="module"
src="../../js/admin/jobs.js">
</script>

</body>
</html>
